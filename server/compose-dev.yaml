services:
  user-links:
    depends_on:
      - user-links-db
    build:
      context: ./user-links/.
    container_name: user-links
    networks:
      - link-share-net
    ports:
      - "127.0.0.1:8080:8080"
    environment:
      - POSTGRES_PASSWORD=${LINK_SHARE_DB_PASSWORD:?database password not set}

  user-links-db:
    image: postgres:18.4
    container_name: user-links-db
    networks:
      - link-share-net
    ports:
      - "127.0.0.1:5432:5432"
    environment:
      POSTGRES_PASSWORD: ${LINK_SHARE_DB_PASSWORD:?database password not set}
    volumes:
      - ./user-links/init-db-dev:/docker-entrypoint-initdb.d
      - user-links-volume:/var/lib/postgresql

volumes:
  user-links-volume:

networks:
  link-share-net:
    driver: bridge
